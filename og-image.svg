<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080E"/>
      <stop offset="100%" stop-color="#13131F"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E4C26B"/>
    </linearGradient>
    <style>
      .brand { font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif; font-weight: 800; fill: #F0F0F5; letter-spacing: -0.03em; }
      .tagline { font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif; font-weight: 500; fill: rgba(240,240,245,0.75); letter-spacing: -0.01em; }
      .eyebrow { font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif; font-weight: 600; fill: #C9A84C; letter-spacing: 0.12em; text-transform: uppercase; }
      .logo { font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif; font-weight: 700; fill: #F0F0F5; letter-spacing: -0.02em; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>
  <text x="80" y="120" class="logo" font-size="34">OrigenLab<tspan fill="#C9A84C">·</tspan></text>
  <text x="80" y="280" class="eyebrow" font-size="22">Agencia Digital · México</text>
  <text x="80" y="380" class="brand" font-size="84">
    <tspan x="80" dy="0">Desarrollo web que</tspan>
    <tspan x="80" dy="96">genera resultados reales.</tspan>
  </text>
  <text x="80" y="560" class="tagline" font-size="28">Sitios rápidos, modernos y profesionales — diseñados para convertir.</text>
  <text x="1120" y="585" class="tagline" font-size="18" text-anchor="end">origenlab.mx</text>
</svg>
